<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
        }

        #main-window {
            background-color: #ccecff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        input {
            width: 200px;
            background-color: rgb(100, 90, 245);
        }

        input::placeholder {
            color: black;
            opacity: 1;
        }

        button {
            margin: 5px;
        }
    </style>
</head>

<body>

    <div id="main-window">
        <h1>Sv-shop</h1>

        <input type="email" placeholder="email"><br><br>
        <input type="password" placeholder="password"><br><br>

        <button id="singin">Singin</button>
        <button id="singup">Singup</button>
    </div>

</body>

</html>
